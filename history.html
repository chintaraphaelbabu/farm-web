<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm - Alert History</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--sky:#8AA7A8;--forest:#3F441C;--cream:#ECE5D1;--sand:#B0A374;--orange:#D68737;}
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:var(--cream);overflow-x:hidden;}
header{background:var(--forest);color:white;padding:15px;text-align:center;font-size:22px;}
.container{padding:20px;}
.card{background:white;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,.1);}
.alert{padding:12px;border-radius:8px;margin-bottom:10px;color:white;font-weight:bold;}
.CRITICAL{background:#d9534f;} .WARNING{background:#f0ad4e;} .INFO{background:#5cb85c;}
.HIGH{background:#d9534f;} .MEDIUM{background:#f0ad4e;} .LOW{background:#5cb85c;}
.empty{text-align:center;color:#aaa;padding:20px;font-style:italic;}
.controls{text-align:center;margin:20px;display:flex;justify-content:center;flex-wrap:wrap;gap:10px;align-items:center;}
button{padding:10px 20px;border:none;border-radius:20px;background:var(--sky);color:white;font-size:14px;cursor:pointer;}
.logout{background:#d9534f;} .clear-btn{background:var(--sand);}
a{text-decoration:none;color:var(--forest);font-weight:bold;}

@media (max-width: 768px) {
  header{font-size:18px;padding:12px;}
  .container{padding:12px;}
  .controls{margin:12px;gap:8px;}
  .controls a,
  .controls button{width:100%;max-width:340px;}
  .card{padding:12px;}
  .alert{font-size:14px;line-height:1.35;word-break:break-word;}
}

@media (max-width: 420px) {
  button{font-size:13px;padding:10px 14px;}
  .alert{padding:10px;}
}
</style>
</head>
<body>
<header>🌱 Smart Farm - Alert History</header>
<div class="controls">
  <a href="dashboard.html">← Dashboard</a>
  <button onclick="downloadCSV()">⬇ Download CSV</button>
  <button class="clear-btn" onclick="clearHistory()">🗑 Clear History</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>
<div class="container">
  <div class="card">
    <h3>📜 Past Alerts</h3>
    <div id="historyList"><div class="empty">Loading...</div></div>
  </div>
</div>
<script>
const SUPABASE_URL = "https://igkzwbazvotgexzjeoxb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlna3p3YmF6dm90Z2V4emplb3hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYxOTIsImV4cCI6MjA5MjM3MjE5Mn0.xdXPVMeC12SszIwoh3PkM3xaEbsuj6HQDBxoEHL9TDo";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

sb.auth.getSession().then(({ data }) => {
  if (!data.session) location.href = "login.html";
});

function logout() { sb.auth.signOut().then(() => location.href = "login.html"); }

const historyList = document.getElementById("historyList");

async function loadHistory() {
  const { data, error } = await sb.from("alert_history").select("*")
    .order("created_at", { ascending: false });
  historyList.innerHTML = "";
  if (error || !data || data.length === 0) {
    historyList.innerHTML = '<div class="empty">No alerts recorded yet.</div>';
    return;
  }
  data.forEach(a => {
    const div = document.createElement("div");
    const sev = a.severity || "INFO";
    div.className = "alert " + sev;
    div.innerHTML = `<span style="opacity:.75;font-size:11px;text-transform:uppercase">${sev}</span>
      &nbsp;·&nbsp; ${a.type || "Unknown"}<br>
      ${a.message || ""}<br>
      <small style="opacity:.8">${new Date(a.created_at).toLocaleString()}</small>`;
    historyList.appendChild(div);
  });
}

async function clearHistory() {
  if (!confirm("Clear all alert history? This cannot be undone.")) return;
  await sb.from("alert_history").delete().neq("id", 0);
  historyList.innerHTML = '<div class="empty">History cleared.</div>';
}

async function downloadCSV() {
  const { data } = await sb.from("alert_history").select("*").order("created_at", { ascending: true });
  if (!data || !data.length) { alert("No history to download."); return; }
  let csv = "time,type,message,severity\n";
  data.forEach(d => {
    const msg = (d.message || "").replace(/"/g, '""');
    csv += `"${d.created_at}","${d.type || ""}","${msg}","${d.severity || ""}"\n`;
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
  a.download = "alert_history.csv"; a.click();
}

loadHistory();
</script>
</body>
</html>
